      table build. This will also provide a historical record
      of child/parent relationships.

    meta:
      background_url: https://gitlab.internal.equipmentshare.com/business-intelligence/ba-finance/-/blob/main/internal_reporting/branch_earnings/branch_earnings_entries.py
    config:
      enabled: true
      tags: ["daily", "branch_earnings"]
    columns:
      - name: dbt_scd_id
        data_tests:
          - unique
