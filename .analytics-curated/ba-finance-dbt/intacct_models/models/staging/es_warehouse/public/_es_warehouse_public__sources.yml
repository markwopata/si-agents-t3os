---
version: 2

sources:
  - name: es_warehouse_public
    tags: ["sources"]
    database: es_warehouse
    schema: public
    description: >
      data in es_warehouse.public (es_warehouse database / public schema) where postgres/T3/Admin data is streamed from
      Very high level overview: T3 Postgres Databases (source) -> WAL consumers (Kubernetes) -> Kinesis Streams -> Lambda
      -> Internal Landing Zone (Snowflake) -> Raw Databases (Snowflake) -> es_warehouse/trackers/etc databases (Snowflake)
    meta:
      point_of_contact: Data Platform team (Monique Jimenez)
    tables:
      - name: markets
        description: "Limited markets table"

      - name: users
        description: every user using admin/T3
        columns:
          - name: user_id
            data_tests:
              - unique
              - not_null

      - name: line_items
        description: >
          Detailed rows in an invoice. Each item purchased represents a line item.  An invoice can have 0 or many line items.
        columns:
          - name: line_item_id
            data_tests:
              - unique

      - name: invoices
        desciption: >
          one row is one invoice. Records a transaction between a buyer and a seller and includes info on amounts and date
          details. An order can have 0 or many invoices
        columns:
          - name: invoice_id
            data_tests:
              - unique
              - not_null

        description: ""
      - name: orders
        description: >
          An order is a customer's request to purchase products or services. Represents the collection of invoices. A purchase
          order can be linked to multiple orders
        columns:
          - name: order_id
            data_tests:
              - unique
              - not_null

      - name: approved_invoice_salespersons
        description: the salespersons/TAMs associated with ES/Admin invoices
        data_tests:
          - dbt_expectations.expect_compound_columns_to_be_unique:
              arguments:
                column_list:
                - invoice_id
                - primary_salesperson_id

      - name: order_salespersons

        description: ""
      - name: companies

        description: ""
      - name: billing_company_preferences

        description: ""
      - name: billing_providers

        description:
          "The billing_provider table defines the relationship between a billing entity and the specific remit-to
          location used when issuing invoices. Each record represents a distinct billing provider used in the invoicing process,
          which may correspond to internal brands, joint ventures, or affiliated dealer entities."
      - name: branch_erp_refs
        description: list of branches

      - name: line_item_types
        description: list of historical line item types

      - name: assets
        description: historical list of assets and its characteristics

      - name: assets_aggregate
        description: view of the assets table + additional info on asset classifications and assignments
        meta:
          generated_from: https://app.snowflake.com/us-west-2/gga45239/#/data/databases/ES_WAREHOUSE_STAGE/schemas/PUBLIC/view/ASSETS_AGGREGATE
        columns:
          - name: asset_id
            data_tests:
              - unique

      - name: line_item_type_erp_refs
        description: GL account number (sage intacct) linked to a line item type id
        columns:
          - name: line_item_type_erp_ref_id
            data_tests:
              - unique

      - name: credit_note_line_items
        description: list of credit notes (whenever ES give customer credit) with line items
        columns:
          - name: credit_note_line_item_id
            description: ""
            data_tests:
              - not_null
              - unique

      - name: credit_notes
        description: list of credit notes (whenever ES give customer credit)

      - name: payments
        description: list of payments
        columns:
          - name: payment_id
            data_tests:
              - unique

      - name: bank_account_erp_refs
        description: GL bank account number (sage intacct) linked to a bank account id

      - name: payment_applications
        description: >
          list of payment appplications. One payment can be applied/linked to multiple invoices

      - name: v_payout_programs
        description: list of assets mapped to a payout program name
        columns:
          - name: payout_program_assignment_id
            data_tests:
              - unique

      - name: credit_note_erp_refs
        description: TBD
        columns:
          - name: credit_note_erp_ref_id
            description: ""
            data_tests:
              - not_null
              - unique

      - name: invoice_erp_refs
        description: TBD

      - name: asset_purchase_history
        description: TBD

      - name: asset_types
        description: TBD

      - name: equipment_models
        description: TBD

      - name: equipment_makes
        description: TBD

      - name: equipment_classes_models_xref
        description: TBD

      - name: equipment_classes
        description: TBD

      - name: categories
        description: TBD

      - name: purchase_orders
        description: list of active/non-active purchase orders and the company associated with it
        columns:
          - name: purchase_order_id
            data_tests:
              - unique

      - name: disputes
        description:
          Disputes are the process of resolving disagreements or discrepancies between a business and its
          customers. one row is one dispute
        meta:
          relation: es_warehouse.public.disputes
        columns:
          - name: dispute_id
            data_tests:
              - unique

      - name: dispute_events
        description: >
          the process of addressing and resolving invoice-related issues, such as discrepancies in pricing, quantity, or delivery.
          one row is one event and one dispute can have many events
        meta:
          relation: es_warehouse.public.dispute_events
        columns:
          - name: dispute_event_id
            data_tests:
              - unique

      - name: dispute_event_types
        description: mapping table of the types of dispute events. eventually turn into seed pending business approval
        meta:
          relation: es_warehouse.public.dispute_event_types
        columns:
          - name: dispute_event_type_id
            data_tests:
              - unique

      - name: dispute_credit_reasons
        description: mapping table of the types of credit reasons. eventually turn into seed pending business approval
        meta:
          relation: es_warehouse.public.dispute_credit_reasons
        columns:
          - name: dispute_credit_reason_id
            data_tests:
              - unique

      - name: dispute_reasons
        description: mapping table of the types of dispute reasons.
        meta:
          relation: es_warehouse.public.dispute_reasons
        columns:
          - name: dispute_reason_id
            data_tests:
              - unique

      - name: credit_note_allocations
        description: list of credit note allocations. one credit note can be allocated to multiple invoices
      - name: rentals
        description: >
          Each item purchased represents a rental.
        columns:
          - name: rental_id
            data_tests:
              - unique
      - name: company_purchase_orders
        description: >
          List of purchase orders — equivalent to “Fleet Track” (purchasing.equipmentshare.com).
          Used to track purchases of fleet equipment, non-rental vehicles, and attachments.
          Will eventually populate the Admin > Assets tab > Purchase History.
        columns:
          - name: company_purchase_order_id
            data_tests:
              - unique
      - name: company_purchase_order_line_items
        description: >
          list of purchase orders line items. a single PO can include multiple line items.
          company_purchase_order_id is a FK to the company_purchase_orders table
        columns:
          - name: company_purchase_order_line_item_id
            data_tests:
              - unique
