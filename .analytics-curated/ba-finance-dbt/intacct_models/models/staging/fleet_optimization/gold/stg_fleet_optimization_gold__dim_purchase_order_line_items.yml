---
version: 2
models:
  - name: stg_fleet_optimization_gold__dim_purchase_order_line_items
    description: Model for fleet_optimization.gold.dim_purchase_order_line_items
    columns:
      - name: po_line_key
        description: Hashed composite key composed of po_line_id and po_line_source
        data_tests:
          - unique
      - name: po_line_source
        description: Silver-layer source of PO Data. At this time, the source will always evaluate to ESDB.
      - name: po_line_id
        description: Unique identifier for purchase order + line. Corresponds to a numerically hashed combination of 
          purchase order number and line item number, but is NOT a concatenated iteration of the two fields.
      - name: po_line_purchase_order_id
        description: Unique identifier for purchase orders, corresponds to purchase order number (without type prefix, 
          e.g. SPO) in FleetTrack.
      - name: po_line_purchase_order_line_item_number
        description: Line number within the purchase order - 1,2,3, etc.
      - name: po_line_asset_key
        description: Unique identifier for each asset in the dim_assets table. Will either be in the form of asset_id or
          asset_key, both numeric values that should work as a join key to dim_assets_fleet_opt.
      - name: po_line_equipment_class_key
        description: Unique identifier for each equipment class in the dim_equipment_classes_fleet_opt table. Can be 
          numeric (equipment_class_id) or string (equipment_class_key)
      - name: po_line_equipment_model_id
        description: Numeric ID or categorical name of the equipment model. As entered via FleetTrack, possibly before 
          asset is created.
      - name: po_line_equipment_make_id
        description: "The make, or original equipment manufacturer, of the asset. \nIn the fleet plan, each class will have
          a rank (1,2,3, etc. priority) and percentage of the target OEC for the class divided between certain makes. \nThis
          field is rendered to UPPER CASE for easier grouping."
      - name: po_line_market_key
        description: Unique identifier for each branch in the dim_markets table. Market_id and market_key are both 
          unique identifiers at this time. For utilization, refers to the rental service providing branch.
      - name: po_line_sage_record_id
        description: Unique identifier for record within Sage accounting system, if needed.
      - name: po_line_invoice_number
        description: Inputted invoice number from FleetTrack. Will not join to dim_invoices_fleet_opt, since those 
          invoices represent revenue and these invoices are payments remitted to vendors.
      - name: po_line_finance_status
        description: "Categorical field representing the most recent finance status recorded for the purchase order line.\
          \ \nPossible values include paid in cash, net terms purchase, dealership floor plan, financed, etc. \nDefault value
          is No Finance Status, indicating the field is NULL at the source.\nAs this field can change over time, certain statuses
          indicating Dealership finance plans can be erased. \nUse po_line_purchase_purpose to track historical statuses related
          to Dealership or Rental purpose rather than finance_status."
      - name: po_line_order_status
        description: "Categorical field representing the most recent order status associated with the line item.\nIf NULL
          in FleetTrack, default value is \"No Order Status\"."
      - name: po_line_payment_status
        description: "Categorical field representing the most recent payment status associated with the line item.\nIndicates
          whether a particular line item is fully or partially paid, or if no payment has been made.\nIf NULL in FleetTrack,
          default value is \"No Payment Made\".\nRaw payment type field in upstream models is used to create this status downstream."
      - name: po_line_reconciliation_status
        description: Status of reconciliation process in FleetTrack. If no status is available, default value is 'No 
          Reconciliation Status'
      - name: po_line_current_promise_date
        description: "Actual date or foreign key to dim_dates_fleet_opt. \nPromise date represents the approximate date the
          rental asset is expected to be delivered to EquipmentShare's possession.\nIf promise date is last day of year (12/31
          of current year) or has a year of 2099, the asset is expected some time in the current year but no month/day estimation
          is possible. See field po_line_is_promised_this_year to filter on this condition.\nIf the promise date is in the
          year 2100, the order has no promise date and is likely to be cancelled. See field po_line_is_likely_to_be_cancelled
          to filter on this condition.\nIf promise date is 01/01/0001 or the key is -1, no promise date is available.\nField
          has undergone cleaning to correct common typos in year. Raw field is also returned to dashboard for use in reactive
          data cleaning."
      - name: po_line_original_promise_date
        description: "Actual date or foreign key to dim_dates_fleet_opt. \nPromise date represents the approximate date the
          rental asset is expected to be delivered to EquipmentShare's possession.\nIf promise date is last day of year (12/31
          of current year) or has a year of 2099, the asset is expected some time in the current year but no month/day estimation
          is possible. See field po_line_is_promised_this_year to filter on this condition.\nIf the promise date is in the
          year 2100, the order has no promise date and is likely to be cancelled. See field po_line_is_likely_to_be_cancelled
          to filter on this condition.\nIf promise date is 01/01/0001 or the key is -1, no promise date is available.\nField
          has undergone cleaning to correct common typos in year. Raw field is also returned to dashboard for use in reactive
          data cleaning."
      - name: current_promise_date_key
        description: ''
      - name: original_promise_date_key
        description: ''
      - name: po_line_promise_year
        description: "Actual date or foreign key to dim_dates_fleet_opt. \nPromise date represents the approximate date the
          rental asset is expected to be delivered to EquipmentShare's possession.\nIf promise date is last day of year (12/31
          of current year) or has a year of 2099, the asset is expected some time in the current year but no month/day estimation
          is possible. See field po_line_is_promised_this_year to filter on this condition.\nIf the promise date is in the
          year 2100, the order has no promise date and is likely to be cancelled. See field po_line_is_likely_to_be_cancelled
          to filter on this condition.\nIf promise date is 01/01/0001 or the key is -1, no promise date is available.\nField
          has undergone cleaning to correct common typos in year. Raw field is also returned to dashboard for use in reactive
          data cleaning."
      - name: po_line_due_date_key
        description: "dim_purchase_order_line_items contains a variety of dates associated with stages of the purchasing process.\n\
          Dates are represented as keys to dim_dates_fleet_opt\nMost are self-explanatory; for questions, consult with the
          Fleet Purchasing team member who submitted the PO.\nFor invoice date: Date of 01/01/1999 means invoice was received
          but is missing."
      - name: po_line_invoice_date_key
        description: "dim_purchase_order_line_items contains a variety of dates associated with stages of the purchasing process.\n\
          Dates are represented as keys to dim_dates_fleet_opt\nMost are self-explanatory; for questions, consult with the
          Fleet Purchasing team member who submitted the PO.\nFor invoice date: Date of 01/01/1999 means invoice was received
          but is missing."
      - name: po_line_paid_date
        description: "dim_purchase_order_line_items contains a variety of dates associated with stages of the purchasing process.\n\
          Dates are represented as keys to dim_dates_fleet_opt\nMost are self-explanatory; for questions, consult with the
          Fleet Purchasing team member who submitted the PO.\nFor invoice date: Date of 01/01/1999 means invoice was received
          but is missing."
      - name: po_line_reconciliation_status_date
        description: "dim_purchase_order_line_items contains a variety of dates associated with stages of the purchasing process.\n\
          Dates are represented as keys to dim_dates_fleet_opt\nMost are self-explanatory; for questions, consult with the
          Fleet Purchasing team member who submitted the PO.\nFor invoice date: Date of 01/01/1999 means invoice was received
          but is missing."
      - name: po_line_license_expiration_date
        description: "dim_purchase_order_line_items contains a variety of dates associated with stages of the purchasing process.\n\
          Dates are represented as keys to dim_dates_fleet_opt\nMost are self-explanatory; for questions, consult with the
          Fleet Purchasing team member who submitted the PO.\nFor invoice date: Date of 01/01/1999 means invoice was received
          but is missing."
      - name: po_line_release_date
        description: "dim_purchase_order_line_items contains a variety of dates associated with stages of the purchasing process.\n\
          Dates are represented as keys to dim_dates_fleet_opt\nMost are self-explanatory; for questions, consult with the
          Fleet Purchasing team member who submitted the PO.\nFor invoice date: Date of 01/01/1999 means invoice was received
          but is missing."
      - name: po_line_title_processed_date
        description: "dim_purchase_order_line_items contains a variety of dates associated with stages of the purchasing process.\n\
          Dates are represented as keys to dim_dates_fleet_opt\nMost are self-explanatory; for questions, consult with the
          Fleet Purchasing team member who submitted the PO.\nFor invoice date: Date of 01/01/1999 means invoice was received
          but is missing."
      - name: po_line_estimated_pay_date
        description: "dim_purchase_order_line_items contains a variety of dates associated with stages of the purchasing process.\n\
          Dates are represented as keys to dim_dates_fleet_opt\nMost are self-explanatory; for questions, consult with the
          Fleet Purchasing team member who submitted the PO.\nFor invoice date: Date of 01/01/1999 means invoice was received
          but is missing."
      - name: po_line_purchase_purpose
        description: "Categorical boolean field indicating if the purchase order line was intended as a Dealership item or
          Rental item.\nLogic is a purchase has a Dealership purpose if the finance status has ever indicated dealership financing
          or if the company_id associated with the asset has ever been one of EquipmentShare's IES company ids.\nHistorical
          (point-in-time) tables used to source these flags rather than current-state tables."
      - name: po_line_equipment_class
        description: "Categorical name of the equipment class, as derived from dim_equipment_classes_fleet_opt or the fleet
          plan. \nWhen associated with PO Line, data entered via FleetTrack, possibly before asset is created. \nIf derived
          from fleet plan, the field is not derived from dim_equipment_classes_fleet_opt based on ID, so use with caution."
      - name: po_line_equipment_make
        description: "The make, or original equipment manufacturer, of the asset. \nIn the fleet plan, each class will have
          a rank (1,2,3, etc. priority) and percentage of the target OEC for the class divided between certain makes. \nThis
          field is rendered to UPPER CASE for easier grouping."
      - name: po_line_equipment_model
        description: Numeric ID or categorical name of the equipment model. As entered via FleetTrack, possibly before 
          asset is created.
      - name: po_line_attachment_details
        description: "Free-text field describing the attribute. \nWhen not available (when blank in Fleet Track), default
          value of 'No <field>' provided.\nSome light text cleaning may be performed on field - for example, cleaning up Not
          Applicable variations into \"Not Applicable\". For more details, see seed_po_text_cleansing.\nNo additional logic
          applied."
      - name: po_line_dot_unit_number
        description: "Free-text field describing the attribute. \nWhen not available (when blank in Fleet Track), default
          value of 'No <field>' provided.\nSome light text cleaning may be performed on field - for example, cleaning up Not
          Applicable variations into \"Not Applicable\". For more details, see seed_po_text_cleansing.\nNo additional logic
          applied."
      - name: po_line_factory_build_specifications
        description: "Free-text field describing the attribute. \nWhen not available (when blank in Fleet Track), default
          value of 'No <field>' provided.\nSome light text cleaning may be performed on field - for example, cleaning up Not
          Applicable variations into \"Not Applicable\". For more details, see seed_po_text_cleansing.\nNo additional logic
          applied."
      - name: po_line_fhwt
        description: Form 220 Heavy Vehicle Use Tax paid to IRS. If blank in FleetTrack, will default to 0.
      - name: po_line_gvwr
        description: Gross weight of item. If blank in FleetTrack, will default to 0.
      - name: po_line_fuel_card
        description: "Free-text field describing the attribute. \nWhen not available (when blank in Fleet Track), default
