      - name: po_line_license_plate_state_abbreviation
        description: "Free-text field describing the attribute. \nWhen not available (when blank in Fleet Track), default
          value of 'No <field>' provided.\nSome light text cleaning may be performed on field - for example, cleaning up Not
          Applicable variations into \"Not Applicable\". For more details, see seed_po_text_cleansing.\nNo additional logic
          applied."
      - name: po_line_lienholder_on_title
        description: "Free-text field describing the attribute. \nWhen not available (when blank in Fleet Track), default
          value of 'No <field>' provided.\nSome light text cleaning may be performed on field - for example, cleaning up Not
          Applicable variations into \"Not Applicable\". For more details, see seed_po_text_cleansing.\nNo additional logic
          applied."
      - name: po_line_note
        description: "Lightly-cleansed free-text notes pertaining to the specific purchase order line. \nIf field is blank
          in FleetTrack, will indicate 'No Note'. \nIf field has text containing \"void\" or \"delete\", po_line_note_indicates_void_or_delete
          will be True.\nNote that POs and PO lines that have been deleted are filtered from model."
      - name: po_line_odometer
        description: "Cast to string value. Default value is 'Unknown Odometer Value'. \nIf odometer value is 0, that is understood
          to be a true reading and not a default value."
      - name: po_line_pending_schedule
        description: "Free-text field describing the attribute. \nWhen not available (when blank in Fleet Track), default
          value of 'No <field>' provided.\nSome light text cleaning may be performed on field - for example, cleaning up Not
          Applicable variations into \"Not Applicable\". For more details, see seed_po_text_cleansing.\nNo additional logic
          applied."
      - name: po_line_serial
        description: "Free-text field describing the attribute. \nWhen not available (when blank in Fleet Track), default
          value of 'No <field>' provided.\nSome light text cleaning may be performed on field - for example, cleaning up Not
          Applicable variations into \"Not Applicable\". For more details, see seed_po_text_cleansing.\nNo additional logic
          applied."
      - name: po_line_tire_size
        description: "Free-text field describing the attribute. \nWhen not available (when blank in Fleet Track), default
          value of 'No <field>' provided.\nSome light text cleaning may be performed on field - for example, cleaning up Not
          Applicable variations into \"Not Applicable\". For more details, see seed_po_text_cleansing.\nNo additional logic
          applied."
      - name: po_line_titled_owner
        description: "Free-text field with some grouping. \nCurrent logic groups:\n--any value containing ES as EquipmentShare\n\
          --any value containing Daimler as Daimler Trust\n--any value containing PNC as PNC Equipment finance\n--any value
          containing Paccar as Paccar \n--default value is No Titled Owner \n--some cleanup also for Not Applicable or other
          common text phrases. For more details, see seed_po_text_cleansing"
      - name: po_line_title_status
        description: Details about in-process title. Default is No Title Status.
      - name: po_line_toll_transponder
        description: "Free-text field describing the attribute. \nWhen not available (when blank in Fleet Track), default
          value of 'No <field>' provided.\nSome light text cleaning may be performed on field - for example, cleaning up Not
          Applicable variations into \"Not Applicable\". For more details, see seed_po_text_cleansing.\nNo additional logic
          applied."
      - name: po_line_vin
        description: "Free-text field describing the attribute. \nWhen not available (when blank in Fleet Track), default
          value of 'No <field>' provided.\nSome light text cleaning may be performed on field - for example, cleaning up Not
          Applicable variations into \"Not Applicable\". For more details, see seed_po_text_cleansing.\nNo additional logic
          applied."
      - name: po_line_asset_year
        description: "Year asset (vehicle or otherwise) was produced by OEM.\nField has undergone cleaning to correct common
          typos in year. Raw field is also returned to dashboard for use in reactive data cleaning.\nSee seed_year_cleansing
          for mapping of typos to returned values."
      - name: po_line_quantity
        description: "The number of items purchased meeting the line's specifications. \nQuantity * net cost = total cost\
          \ \nDefault quantity is 0"
      - name: po_line_aftermarket_oec
        description: "Cost associated with the particular line item. \nMiscellaneous costs include: \n--aftermarket OEC (original
          equipment cost of aftermarket add-ons) \n--freight costs\n--net cost, the individual price for each item represented
          by the purchase order line item\n--rebate\n--registration costs for vehicle rental asset (this cost can now be capitalized
          and will be tracked as of January 2025) \nDefault value of cost is 0."
      - name: po_line_freight_cost
        description: "Cost associated with the particular line item. \nMiscellaneous costs include: \n--aftermarket OEC (original
          equipment cost of aftermarket add-ons) \n--freight costs\n--net cost, the individual price for each item represented
          by the purchase order line item\n--rebate\n--registration costs for vehicle rental asset (this cost can now be capitalized
          and will be tracked as of January 2025) \nDefault value of cost is 0."
      - name: po_line_registration_cost
        description: "Cost associated with the particular line item. \nMiscellaneous costs include: \n--aftermarket OEC (original
          equipment cost of aftermarket add-ons) \n--freight costs\n--net cost, the individual price for each item represented
          by the purchase order line item\n--rebate\n--registration costs for vehicle rental asset (this cost can now be capitalized
          and will be tracked as of January 2025) \nDefault value of cost is 0."
      - name: po_line_sales_tax
        description: "Any tax associated with the line item.\nSales tax occurs primarily on rental equipment and only applies
          to assets that incur sales tax (not every state assesses sales tax for heavy equipment purchase).\nTax occurs primarily
          on the vehicle side and is in addition ot the titling fee/registration cost; it represents the first tax when a
          vehicle is registered.\nThe two tax fields should not be coalesced or substituted for each other, and are almost
          always exclusive (i.e. sales tax but no vehicle tax assessed). \nDefault value is 0"
      - name: po_line_tax
        description: "Any tax associated with the line item.\nSales tax occurs primarily on rental equipment and only applies
          to assets that incur sales tax (not every state assesses sales tax for heavy equipment purchase).\nTax occurs primarily
          on the vehicle side and is in addition ot the titling fee/registration cost; it represents the first tax when a
          vehicle is registered.\nThe two tax fields should not be coalesced or substituted for each other, and are almost
          always exclusive (i.e. sales tax but no vehicle tax assessed). \nDefault value is 0"
      - name: po_line_net_price
        description: "Cost associated with the particular line item. \nMiscellaneous costs include: \n--aftermarket OEC (original
          equipment cost of aftermarket add-ons) \n--freight costs\n--net cost, the individual price for each item represented
          by the purchase order line item\n--rebate\n--registration costs for vehicle rental asset (this cost can now be capitalized
          and will be tracked as of January 2025) \nDefault value of cost is 0."
      - name: po_line_rebate
        description: "Cost associated with the particular line item. \nMiscellaneous costs include: \n--aftermarket OEC (original
          equipment cost of aftermarket add-ons) \n--freight costs\n--net cost, the individual price for each item represented
          by the purchase order line item\n--rebate\n--registration costs for vehicle rental asset (this cost can now be capitalized
          and will be tracked as of January 2025) \nDefault value of cost is 0."
      - name: po_line_total_cost
        description: Net price * quantity for each line item. Default value is 0
      - name: po_line_calculated_oec
        description: Total cost (net price * quantity) + freight for each line item. Default value is 0
      - name: po_line_has_aftermarket_oec
        description: Flag indicating that any non-0 value for aftermarket OEC is recorded on this line item
      - name: po_line_has_attachments
        description: Flag indicating that the line item's asset has a non-default value in the Attachments column.
      - name: po_line_has_fuel_card
        description: Flag indicating that the line item's asset has a non-default value in the Fuel Card column
      - name: po_line_has_lienholder
        description: Flag indicating that the line item's asset has a non-default value in the Lienholder column
      - name: po_line_has_toll_transponder
        description: Flag indicating that the line item's asset has a non-default value in the Toll Transponder column
      - name: po_line_has_odometer_reading
        description: Flag indicating that the line item's asset has a non-default value in the Odometer column
      - name: po_line_has_no_assigned_market
        description: Flag indicating that the purchased rental asset has not yet been assigned to a rental market
      - name: po_line_has_zero_quantity_or_cost
        description: Flag indicating if quanitty = 0 or total_cost = 0 when net_cost does not equal 0.
      - name: po_line_open_order_flag
        description: "Flag indicating that the purchase has not been invoiced and has a status associated with an open order.\
          \ \nFor mappings, see seed_po_order_statuses."
      - name: po_line_is_promised_this_year
        description: "Actual date or foreign key to dim_dates_fleet_opt. \nPromise date represents the approximate date the
          rental asset is expected to be delivered to EquipmentShare's possession.\nIf promise date is last day of year (12/31
