          will be True.\nNote that POs and PO lines that have been deleted are filtered from model."
      - name: po_line_invoice_year_from_fleettrack
        description: "Included in dimension to aid fleet team in correcting data entry errors in FleetTrack. \nThis is the
          original entry from FleetTrack that has been corrected in the final dimension.\nIt is possible for this field to
          be NULL as this field is intended to be a true representation of FleetTrack."
      - name: po_line_asset_year_from_fleettrack
        description: "Included in dimension to aid fleet team in correcting data entry errors in FleetTrack. \nThis is the
          original entry from FleetTrack that has been corrected in the final dimension.\nIt is possible for this field to
          be NULL as this field is intended to be a true representation of FleetTrack."
      - name: po_line_recordtimestamp
        description: Timestamp of last run of purchase order line items dimension
