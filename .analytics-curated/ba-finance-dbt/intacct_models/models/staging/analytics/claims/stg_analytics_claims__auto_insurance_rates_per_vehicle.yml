---
version: 2

models:
  - name: stg_analytics_claims__auto_insurance_rates_per_vehicle
    description: > 
      "Insurance rates per vehicle calculated based on claims data and vehicle count. This table is used 
      to allocate auto insurance costs to branches and is filtered by the latest update timestamp per policy period."

    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - lower_bound
            - policy_period_start  

    columns:
      - name: lower_bound
        description: ""

      - name: upper_bound
        description: ""

      - name: per_vehicle_rate
        description: ""

      - name: per_vehicle_rate_monthly
        description: "Monthly rate calculated by dividing the annual per_vehicle_rate by 12."

      - name: policy_period_start
        description: ""

      - name: policy_period_end
        description: ""

      - name: branch_earnings_month
        description: ""

      - name: _es_update_timestamp
        description: ""
