      - name: metadata__brand
        description: Extracted from json in column metadata (roughly metadata:brand)
      - name: metadata__return_date
        description: Extracted from json in column metadata (roughly metadata:return_date)
      - name: metadata__total_taxes
        description: Extracted from json in column metadata (roughly metadata:total_taxes)
      - name: metadata__phone
        description: Extracted from json in column metadata (roughly metadata:phone)
      - name: metadata__pick_up_date
        description: Extracted from json in column metadata (roughly metadata:pick_up_date)
      - name: metadata__total_extras
        description: Extracted from json in column metadata (roughly metadata:total_extras)
      - name: metadata__transaction_id
        description: Extracted from json in column metadata (roughly metadata:transaction_id)
      - name: metadata__total_price
        description: Extracted from json in column metadata (roughly metadata:total_price)
      - name: metadata__total_revenue
