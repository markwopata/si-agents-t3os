---
version: 2
models:
  - name: stg_analytics_stripe_vsg_charge_key__product
    description: >
      Products describe the specific goods or services you offer to your customers. For example, you might offer a
      Standard and Premium version of your goods or service; each version would be a separate Product. They can be
      used in conjunction with Prices to configure pricing in Payment Links, Checkout, and Subscriptions.
    meta:
      documentation_url: https://docs.stripe.com/api/products
    columns:
      - name: id
        description: "Unique identifier for the product."
        data_tests:
          - not_null
          - unique
      - name: is_active
        description: "Flag indicating if the product is active."
      - name: caption
        description: "Selling caption for the product. Always null."
      - name: date_created
        description: "Date and time the product was created."
      - name: description
        description: "Description of the product."
      - name: is_live_mode
        description: "Has the value true if the object exists in live mode or the value false if the object exists in test mode."
      - name: metadata
        description: "Metadata associated with the product. json/variant field"
      - name: name
        description: "Name of the product."
      - name: package_dimensions_height
        description: "Package height."
      - name: package_dimensions_length
        description: "Package length."
      - name: package_dimensions_weight
        description: "Package weight."
      - name: package_dimensions_width
        description: "Package width."
      - name: shippable
        description: "Whether this product is shipped (physical goods)."
      - name: statement_descriptor
        description: "Extra information appearing on the customer’s statement."
      - name: type
        description: "Type of the product (e.g., good, service)."
      - name: unit_label
        description: "Label representing units of this product for receipts and invoices."
      - name: updated
        description: "Time the product was last updated."
      - name: url
        description: "Public URL for this product."
      - name: is_deleted
        description: "Indicates if the product has been deleted. Flag generated by Fivetran."
      - name: _fivetran_synced
        description: "Timestamp of the sync from Stripe"
