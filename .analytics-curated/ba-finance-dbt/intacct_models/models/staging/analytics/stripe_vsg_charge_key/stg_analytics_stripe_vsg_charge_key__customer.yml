---
version: 2
models:
  - name: stg_analytics_stripe_vsg_charge_key__customer
    description: >
      This object represents a customer of your business. Use it to create recurring charges, save payment and contact
      information, and track payments that belong to the same customer.
    meta:
      documentation_url: https://docs.stripe.com/api/customers
    columns:
      - name: id
        description: "Unique identifier for the customer."
        data_tests:
          - not_null
          - unique
      - name: account_balance
        description: "Current balance maintained on the customer (negative = credit, positive = amount owed)."
      - name: balance
        description: "Deprecated in favor of account_balance."
      - name: created
        description: ""
      - name: currency
        description: "Default three-letter ISO currency code for recurring billing."
      - name: address_city
        description: ""
      - name: address_country
        description: ""
      - name: address_line_1
        description: ""
      - name: address_line_2
        description: ""
      - name: address_postal_code
        description: ""
      - name: address_state
        description: ""
      - name: name
        description: "Customer name."
      - name: bank_account_id
        description: "ID of the bank account associated with this customer."
      - name: source_id
        description: "ID of the source associated with this customer."
      - name: default_card_id
        description: "ID for the default card used by the customer."
      - name: delinquent
        description: "True if the latest invoice is unpaid or the latest charge failed."
      - name: description
        description: "Arbitrary string attached to the object, useful for display."
      - name: email
        description: "Customer’s email address."
      - name: phone
        description: "Customer’s phone number."
      - name: invoice_prefix
        description: "Prefix applied to generated invoice numbers for this customer."
      - name: invoice_settings_default_payment_method
        description: "Default payment method used for invoices."
      - name: invoice_settings_footer
        description: "Footer text to include on invoices for this customer."
      - name: livemode
        description: "Indicates if this is a test customer."
      - name: metadata
        description: "Custom metadata added to the record, in JSON string format."
      - name: shipping_address_city
        description: "Attribute of the customer's shipping address."
