        description: "Attribute of the customer's shipping address."
      - name: shipping_address_state
        description: "Attribute of the customer's shipping address."
      - name: shipping_carrier
        description: "Delivery service used for shipping (if physical goods)."
      - name: shipping_name
        description: "Recipient name for shipping."
      - name: shipping_phone
        description: "Recipient phone for shipping."
      - name: shipping_tracking_number
