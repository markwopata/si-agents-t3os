---
version: 2
models:
  - name: stg_analytics_stripe_vsg_resla_com__payment_intent
    description:
      A PaymentIntent guides you through collecting a payment from your customer. We
      recommend creating exactly one PaymentIntent for each order or customer session in
      your system. You can reference the PaymentIntent later to see the history of
      payment attempts for a particular session.

      A PaymentIntent transitions through multiple statuses throughout its lifetime as
      it interfaces with Stripe.js to perform authentication flows and ultimately creates at
      most one successful charge.
    meta:
      documentation_url: https://docs.stripe.com/api/payment_intents
    columns:
      - name: id
        description: "Unique identifier for the PaymentIntent."
        data_tests:
          - not_null
          - unique
      - name: connected_account_id
        description: "ID of the connected account associated with this PaymentIntent."
      - name: payment_method_types
        description: "List of allowed payment method types for this PaymentIntent."
      - name: amount_in_cents
        description: "Amount in cents."
      - name: amount
        description: "Amount in dollars (amount_in_cents / 100.0)."
      - name: amount_capturable_in_cents
        description: "Amount capturable in cents."
      - name: amount_capturable
        description: "Amount capturable in dollars (amount_capturable_in_cents / 100.0)."
      - name: amount_received_in_cents
        description: "Amount received in cents."
      - name: amount_received
        description: "Amount received in dollars (amount_received_in_cents / 100.0)."
      - name: application
        description: "ID of the Connect application that created the PaymentIntent."
      - name: application_fee_amount
        description: "Amount of the application fee, if any."
      - name: canceled_at
        description: "Time at which the PaymentIntent was canceled (when status=canceled)."
      - name: cancellation_reason
        description: "Reason the PaymentIntent was canceled."
      - name: capture_method
        description: "When funds are captured from the customer's account."
      - name: confirmation_method
        description: "Whether the PaymentIntent is confirmed automatically or manually."
      - name: created
        description: ""
      - name: currency
        description: "Three-letter ISO currency code, in lowercase."
