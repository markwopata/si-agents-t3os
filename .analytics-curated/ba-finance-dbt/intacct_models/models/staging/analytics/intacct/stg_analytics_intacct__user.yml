---
version: 2
models:
  - name: stg_analytics_intacct__user
    description: Intacct user table, cleaned
    config:
      tags:
        - hourly
        - intacct
        - source
    columns:
      - name: pk_user_id
        description: Primary key for table
        data_tests:
          - not_null
          - unique
      - name: username
        description: User's login id/user name
        data_tests:
          - not_null
      - name: user_description
        description: User's full name
      - name: is_admin
        description: Flag if user is admin
      - name: is_visible
        description: Flag if user is visible in front end
      - name: user_status
        description: active/inactive status of user
      - name: user_access_notes
        description: Notes for user access grant reasons
      - name: date_created
        description: "{{ doc('date_created') }}"
      - name: date_updated
        description: "{{ doc('date_updated') }}"
      - name: _es_update_timestamp
        description: "{{ doc('_es_update_timestamp') }}"
      - name: dds_read_timestamp
        description: "{{ doc('dds_read_timestamp') }}"
