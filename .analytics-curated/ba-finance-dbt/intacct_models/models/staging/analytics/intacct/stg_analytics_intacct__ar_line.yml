      - name: secondary_line_number
        description:
          "This line uniquely orders lines in a record, partitioned by fk_ar_header_id, debit_credit_sign, line
          amount\n  ordered by fk_ar_line_id. For some overpaymententry records, one of half of the transactions (the -1 or
          the\n  1 debit_credit_sign transactions) don't have any detail on them. This secondary_line_number gives you an\n\
          \  join back so you can see which line equates to which offset line. The lines without info are basically\n  arbitrary
          - you can't tell them apart. If they have the same amount, it doesn't matter which one gets paired\n  with which
          line. We just need the unique pairing.\n"
