---
version: 2
models:
  - name: stg_analytics_public__districts
    description: >
      Table identifies districts at EquipmentShare (e.g. 5-1). Each region has multiple districts. One of the districts
      in each region is dedicated to advanced solutions. However, it is not the same district number in each region. As
      of 2025, do not use es_warehouse.public.districts!
    columns:
      - name: id
        description: "Primary key for table"
        data_tests:
          - unique
          - not_null
          - dbt_utils.at_least_one
      - name: region_id
        description: "Region number"
        data_tests:
          - not_null
      - name: district_id
        description: "District in the format region-district_number, e.g. 5-1"
        data_tests:
          - unique
          - not_null
