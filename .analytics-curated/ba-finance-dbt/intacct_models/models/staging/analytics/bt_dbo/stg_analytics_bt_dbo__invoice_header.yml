---
version: 2
models:
  - name: stg_analytics_bt_dbo__invoice_header
    description: Table for header level details of invoices, capturing essential
      information about each invoice transaction. Once an Order is fullfilled it is converted to an Invoice
    tags: [bisTrack]
    columns:
      - name: invoice_header_id
        description: "Unique identifier for the invoice header."
      - name: bt_branch_id
        description: "{{ doc('bt_branch_id') }}"
      - name: customer_id
        description: "Identifier for the customer associated with the invoice."
      - name: invoice_number
        description: "Invoice number assigned to the transaction."
      - name: reference
        description: "Reference information for the invoice."
      - name: status
        description: "Current status of the invoice."
      - name: posting_date
        description: "Date when the invoice was posted."
      - name: created_by_id
        description: "Identifier for the user who created the invoice."
      - name: datetime_created
        description: "Timestamp when the invoice was created."
      - name: datetime_last_modified
        description: "Timestamp when the invoice was last modified."
      - name: last_modified_by_id
        description: "Identifier for the user who last modified the invoice."
      - name: notes
        description: "Additional notes or comments for the invoice."
      - name: _fivetran_deleted
        description: "{{ doc('_fivetran_deleted') }}"
      - name: _fivetran_synced
        description: "{{ doc('_fivetran_synced') }}"
