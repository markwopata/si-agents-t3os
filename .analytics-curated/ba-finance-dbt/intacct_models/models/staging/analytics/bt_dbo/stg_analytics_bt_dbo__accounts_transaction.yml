---
version: 2
models:
  - name: stg_analytics_bt_dbo__accounts_transaction
    description: Table for accounts transaction records, including details about payments, liens, and remittance advice.
    tags: [bisTrack]
    columns:
      - name: accounts_transaction_id
        description: Unique identifier for the accounts transaction.
      - name: group_statement_id
        description: Foreign key to the group statement.
