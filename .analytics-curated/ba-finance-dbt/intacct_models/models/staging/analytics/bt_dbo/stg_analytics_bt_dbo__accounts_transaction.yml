      - name: settlement_disc_due_date
        description: Date when the settlement discount is due.
      - name: tax_amount_in_currency
        description: Tax amount in the transaction currency.
      - name: exchange_rate
        description: Exchange rate used for the transaction.
      - name: transaction_type
        description: Type of the transaction.
