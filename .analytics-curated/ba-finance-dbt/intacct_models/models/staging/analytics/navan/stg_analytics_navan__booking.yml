        description: 'Policy compliance level of the booking'
      - name: trip_name
        description: 'Name assigned to the trip'
      - name: vat
        description: 'Value Added Tax amount'
      - name: trip_length
        description: 'Duration of the trip in days'
      - name: approver_email
        description: 'Email address of the person who approved the booking'
      - name: company_office
        description: 'Office location associated with the booking'
      - name: fare_class
        description: 'Fare class for flight bookings'
      - name: flight_mile
        description: 'Miles flown for flight bookings'
      - name: booking_status
        description: 'Current status of the booking (e.g., confirmed, cancelled)'
      - name: travel_agent_request_fee
        description: 'Fee charged for travel agent assistance'
