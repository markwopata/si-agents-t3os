---
version: 2
models:
  - name: stg_analytics_navan__booking
    description: Staging model for Navan bookings, containing comprehensive travel booking details from the Navan (formerly TripActions) travel management platform
    columns:
      - name: uuid
        description: 'Unique identifier for the booking record'
        data_tests:
          - not_null
          - unique
      - name: eticket
        description: 'Electronic ticket number associated with the booking'
      - name: cnr_cnr_codes
        description: 'Compare and Return codes for price comparison'
      - name: cnr_cnr_sources
        description: 'Sources used for Compare and Return price comparison'
      - name: cnr_cnr_provider
        description: 'Provider used for Compare and Return price comparison'
      - name: _fivetran_deleted
        description: 'Indicates if the record was deleted by Fivetran'
      - name: _fivetran_synced
        description: 'Timestamp when the record was last synced by Fivetran'
      - name: carbon_offset_cost
        description: 'Cost associated with carbon offset for the booking'
      - name: trip_bucks_earned
        description: 'Reward points earned from the booking'
      - name: reason
        description: 'Reason provided for the booking'
      - name: out_of_policy_description
        description: 'Description of why the booking was out of policy'
      - name: extras_fee
        description: 'Additional fees for extra services'
      - name: cabin_purchased
        description: 'Type of cabin purchased for flight bookings'
      - name: hotel_chain
        description: 'Hotel chain associated with the booking'
