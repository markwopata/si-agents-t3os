        description: 'Maximum price allowed by company policy'
      - name: train_mile
        description: 'Miles traveled by train'
      - name: vendor
        description: 'Vendor providing the travel service'
      - name: exchange_fee
        description: 'Fee charged for exchanging a booking'
      - name: currency
        description: 'Currency used for the booking transaction'
      - name: grand_total
        description: 'Total cost of the booking in the original currency'
      - name: resort_fee
        description: 'Additional fee charged by resorts'
