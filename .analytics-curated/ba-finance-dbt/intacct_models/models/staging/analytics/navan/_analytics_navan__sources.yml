      - name: booking_eticket
        description: 'Electronic ticket information for Navan travel bookings'
        data_tests:
          - dbt_expectations.expect_compound_columns_to_be_unique:
              arguments:
                column_list:
                - booking_uuid
                - index
      - name: booking_origin
        description: 'Origin information for Navan travel bookings'
        columns:
          - name: booking_uuid
            data_tests:
              - unique
      - name: booking_out_of_policy_violation_type
        description: 'Information about policy violations in Navan bookings'
        data_tests:
