            description: current status of the assessment
            data_tests:
              - not_null
          - name: taxable_value
            description: taxable value associated with the assessment
            data_tests:
              - not_null
          - name: tax_assessment
            description: amount authority declared as owed
            data_tests:
              - not_null
          - name: period_start
            description: start date of the assessment period
