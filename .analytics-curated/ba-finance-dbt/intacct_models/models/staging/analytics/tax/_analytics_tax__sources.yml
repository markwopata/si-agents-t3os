              - not_null
          - name: tax_authority_id
            description: identifier for the tax authority
            data_tests:
              - not_null
          - name: parcel_id
            description: identifier for the parcel
            data_tests:
              - not_null
          - name: notes
            description: additional notes regarding the assessment
