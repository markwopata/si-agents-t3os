version: 2

models:
  - name: gl_subledger_detail
    description: >
      This model expands gl_detail with subledger detail.
    config:
      tags: ["hourly", "intacct"]
      snowflake_warehouse: 'PROD_ANALYTICS_LARGE_PROCESSESING_WH'
    columns:
      - name: pk_gl_detail_id
        description: Primary key for the GL detail.
        data_tests:
          - unique
          - not_null
      - name: market_id
        description: Identifier for the market.
      - name: market_name
        description: Name of the market.
      - name: entry_date
        description: Date of the entry.
      - name: journal_type
        description: Type of the journal.
      - name: journal_transaction_number
        description: Transaction number of the journal.
      - name: journal_title
        description: Title of the journal.
      - name: entry_description
        description: Description of the entry.
      - name: gl_amount
        description: Amount in the general ledger.
      - name: created_by_username
        description: Username of the creator.
      - name: vendor_id
        description: Identifier for the vendor.
      - name: vendor_name
        description: Name of the vendor.
      - name: customer_id
        description: Identifier for the customer.
      - name: customer_name
        description: Name of the customer.
      - name: document_type
        description: Type of the document.
      - name: document_number
        description: Number of the document.
      - name: line_description
        description: Description of the line item or entry description.
      - name: quantity
        description: Quantity of items.
      - name: unit_price
        description: Unit price of the items.
      - name: url_journal
        description: URL for the journal.
      - name: url_concur
        description: URL for Concur.
      - name: url_invoice_sage
        description: URL for the invoice in Sage.
      - name: url_invoice_admin
        description: URL for the invoice in Admin.
      - name: url_po_sage
        description: URL for the purchase order in Sage.
      - name: url_po_t3
        description: URL for the purchase order in T3.
