---
version: 2
models:
  - name: inventory_balance
    description:
      "Current state of inventory balances for all ES stores and parts. One intended use of this is to snapshot
      inventory balances at least monthly."
    config:
      tags: ["hourly"]
    columns:
      - name: pk_inventory_balance_id
        description: "Store_id concat part_id should be unique for current inventory balance report"
        data_tests:
          - unique_store_fails:
              config:
                severity: warn
                store_failures: true
          - not_null
      - name: timestamp
        description: "Timestamp of when the snapshot was taken."
      - name: store_part_id
        data_tests:
          - unique_store_fails:
              config:
                severity: warn
                store_failures: true
          - not_null
        description: ""
      - name: market_id
        description: "{{ doc('market_id') }}"
      - name: store_id
        description: ""
      - name: store_name
        description: ""
      - name: part_id
        description: ""
      - name: part_number
        description: ""
      - name: description
        description: "Part description is stored in part_types table"
      - name: parent_store_id
        description: "Parent store if it exists"
      - name: provider_name
        description: ""
      - name: min
        description: "Threshold in store_parts"
      - name: max
        description: "Max in store_parts"
      - name: quantity
        description: ""
      - name: total_quantity
        description: "total_quantity = quantity"
      - name: cost
        description: "Most recent cost of store/part"
      - name: average_cost
        description: "Weighted average cost of store/part"
      - name: total_value
        description: "quantity * average_cost"
      - name: market_name
        description: ""
      - name: is_default_store
        description: "Bool for whether or not this inventory location is the primary for the branch"
