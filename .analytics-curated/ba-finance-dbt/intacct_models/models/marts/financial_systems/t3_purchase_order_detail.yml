version: 2
models:
  - name: t3_purchase_order_detail
    description: >
      This query provides external system–ready line items for our T3 purchase orders,
      with a consistent structure suitable for integration and general downstream use.
    columns:
      - name: t3_po_line_key
        description: "T3 purchase order line item ID"
        data_tests:
          - unique

      - name: fk_t3_po_header_key
        description: "Foreign key reference to the T3 purchase order header"
        data_tests:
          - not_null

      - name: t3_line_number
        description: "Line number of the purchase order line item"

      - name: t3_item_id
        description: "T3 item ID for the line item"

      - name: t3_line_description
        description: "Description of the line item"

      - name: t3_line_memo
        description: "Memo for the line item"

      - name: t3_qty_ordered
        description: "Quantity ordered for the line item"

      - name: t3_ppu
        description: "Price per unit for the line item"

      - name: t3_line_amount
        description: "Total amount for the line item"

      - name: t3_item_type
        description: "Type of item (INVENTORY or NON_INVENTORY)"

      - name: t3_part_id
        description: "Part ID associated with the item"

      - name: t3_part_number
        description: "Part number for the item"

      - name: t3_part_name
        description: "Name of the part"

      - name: t3_part_description
        description: "Description field from the part metadata"

      - name: t3_part_provider_name
        description: "Name of the provider associated with the part"

      - name: sage_item_id
        description: "Derived Sage item ID."

      - name: t3_updated_at
        description: "Timestamp of the most recent update from the ES layer"

      - name: t3_date_archived
        description: "Date the PO line item was archived"
