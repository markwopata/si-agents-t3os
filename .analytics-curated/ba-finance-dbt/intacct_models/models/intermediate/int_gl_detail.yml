---
version: 2

models:
  - name: int_gl_detail
    description: >
      Join in subledger data to gl detail. At this step of transformation, this is raw gl entry table joined to gl
        resolve (subledger). It includes posted and unposted data. On the resolve side, some resolve entries are
        ignored or corrected so the entries are correct.
    config:
      tags: ["hourly", "intacct", "intermediate"]
      snowflake_warehouse: 'PROD_ANALYTICS_LARGE_PROCESSESING_WH'
    columns:
      - name: pk_gl_detail_id
        description: "{{ doc('pk_generic') }}"
        data_tests:
          - not_null
          - unique
      - name: fk_gl_entry_id
        description: "{{ doc('fk_gl_entry_id') }}"
      - name: fk_gl_resolve_id
        description: "{{ doc('fk_gl_resolve_id') }}"
      - name: entry_date
        description: ""
      - name: account_number
        description: "{{ doc('account_number') }}"
      - name: account_name
        description: "{{ doc('account_name') }}"
      - name: fk_account_id
        description: "{{ doc('fk_account_id') }}"
      - name: account_normal_balance
        description: "{{ doc('account_normal_balance') }}"
      - name: account_type
        description: "{{ doc('account_type') }}"
      - name: department_id
        description: "{{ doc('department_id') }}"
      - name: market_id
        description: "{{ doc('market_id') }}"
      - name: market_name
        description: "{{ doc('market_name') }}"
      - name: department_name
        description: "{{ doc('department_name') }}"
      - name: entity_id
        description: "{{ doc('entity_id') }}"
      - name: entity_name
        description: "{{ doc('entity_name') }}"
      - name: extended_entity_name
        description: "{{ doc('extended_entity_name') }}"
      - name: raw_amount
        description: "{{ doc('gle_raw_amount_w_sl') }}"
      - name: entry_description
        description: "{{ doc('entry_description') }}"
      - name: journal_title
        description: "{{ doc('journal_title') }}"
      - name: debit_credit
        description: "{{ doc('debit_credit') }}"
      - name: debit_credit_sign
        description: "{{ doc('debit_credit_sign') }}"
      - name: net_amount
        description: ""
      - name: positive_revenue_sign
        description: "{{ doc('positive_revenue_sign') }}"
      - name: applied_sign
        description: "{{ doc('gle_applied_sign') }}"
      - name: amount
        description: ""
      - name: raw_trx_amount
        description: "{{ doc('raw_trx_amount') }}"
      - name: net_trx_amount
        description: "{{ doc('net_trx_amount') }}"
      - name: trx_amount
        description: "{{ doc('trx_amount') }}"
