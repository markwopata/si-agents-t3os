---
version: 2
models:
  - name: int_assets
    description: >
      Intermediate model for assets with detailed information including make, model, and other details.
      Replacement for assets_aggregate. Includes deleted assets.
    config:
      materialized: dynamic_table
      snowflake_warehouse: DYNAMIC_TABLES_WH
      target_lag: 15 minutes
      refresh_mode: "full"
      initialize: ON_CREATE
      post_hook: "alter dynamic table {{ this }} resume"
    columns:
      - name: asset_id
        description: "Unique identifier for the asset"
        data_tests:
          - not_null
          - unique
      - name: asset_type_id
        description: "Foreign key to the asset_types table"
      - name: asset_type
        description: "Asset type is the general type of the asset, such as equipment, vehicle, etc."
      - name: equipment_make_id
        description: "Foreign key to the equipment_makes table"
      - name: make
        description: "Equipment make is the name of the manufacturer or brand of the equipment."
      - name: equipment_model_id
        description: "Foreign key to the equipment_models table"
      - name: model
        description: "Equipment model is the specific model of the equipment."
      - name: year
        description: "Year of manufacture"
      - name: custom_name
        description: "Assets can have a name to identify them. Free text field."
      - name: serial_number
        description: "Serial number of the asset. When populated this is unique. Each manufacturer has a different way of identifying their assets."
      - name: vin
        description: "Vehicle Identification Number. This is a unique identifier for vehicles."
      - name: license_plate_number
        description: "License plate number of the asset, if applicable."
      - name: serial_number_or_vin
        description: "Serial number or VIN, coalesced."
      - name: equipment_class_id
        description: "Foreign key to the equipment_classes table. Equipment class is derived through the model -> class xref."
      - name: equipment_class
        description: "This generally classifies equipment. Equipment class is derived through the model -> class xref."
      - name: category_id
        description: "Foreign key to the categories table. This is a more general categorization of the asset. This can be null. We grab the category through the equipment class table. If this is null, we use the one on the asset."
      - name: category
        description: "More general categorization of the asset. This can be null. We grab the category through the equipment class table. If this is null, we use the one on the asset."
      - name: parent_category_id
        description: "Foreign key to the categories table. This is a more general categorization of the asset. This can be null. We grab the category through the equipment class table. If this is null, we use the one on the asset. Then check if this has a parent_category_id."
      - name: parent_category_name
        description: "More general categorization of the asset. This can be null. We grab the category through the equipment class table. If this is null, we use the one on the asset. Then check if this has a parent_category."
      - name: sub_category_id
        description: "(Alias for category_id) Foreign key to the categories table. This is a more general categorization of the asset. This can be null. We grab the category through the equipment class table. If this is null, we use the one on the asset. Then check if this has a sub_category_id."
      - name: sub_category_name
        description: "(Alias for category) More general categorization of the asset. This can be null. We grab the category through the equipment class table. If this is null, we use the one on the asset. Then check if this has a sub_category."
      - name: asset_company_id
        description: "Identifier for the owning company"
      - name: owning_company_name
        description: "Name of the owning company"
      - name: is_es_owned_company
        description: "Flag indicating if the company is owned by ES"
      - name: is_rerent_asset
        description: >
          Flag indicating if the asset is a re-rent asset. This means we rented it from another company to provide to a
          customer.
      - name: rental_branch_id
        description: "Identifier for the rental branch. Foreign key to the markets table."
      - name: rental_branch_name
        description: "Name of branch that rents the asset. Non-rental assets will have this as null."
      - name: inventory_branch_id
        description: "Identifier for the inventory branch. Foreign key to the markets table."
      - name: inventory_branch_name
        description: "Name of the inventory branch"
      - name: service_branch_id
        description: "Identifier for the service branch. Foreign key to the markets table."
      - name: service_branch_name
        description: "Branch that services the asset. This can be different from rental/inventory branch."
      - name: state
        description: "State the owning branch is located in. e.g. AZ, CA, etc."
      - name: market_id
        description: "Generally understood to be the market that owns this asset. Coalesce(rental_branch_id, inventory_branch_id). Foreign key to the markets table."
      - name: market_name
        description: "Generally understood to be the market that owns this asset. Coalesce(rental_branch_id, inventory_branch_id)."
      - name: market_company_id
        description: "Company that owns the market."
      - name: is_managed_by_es_owned_market
        description: "Flag indicating if the market is managed by an ES-owned company"
      - name: is_in_transit
        description: >
          Flag indicating if the transfer order is currently in transit (true/false). applies to assets currently in transit for a transfer where status = Approved. 
          The primary driver of asset transfers is a branch needs an asset they don't currently have available to fulfill a rental. So they request it from a branch that is close by that has one available. 
          A transfer leads to the asset changing its market to this new market
      - name: status
        description: "Workflow status of the transfer (e.g., requested, approved, received, cancelled, closed)."
      - name: first_rental_date
        description: "Timestamp the asset was rented first. Note this can change because rental start dates can be changed."
      - name: latest_rental_start_date
        description: "Most recent rental start timestamp for the asset."
      - name: last_rental_date
        description: "Most recent off-rent timestamp for the asset. (Deprecated - alias for last_off_rent_date)"
      - name: last_off_rent_date
        description: "Most recent off-rent timestamp for the asset."
      - name: purchase_date
        description: "Date of purchase"
      - name: invoice_number
        description: "Invoice number associated with the asset purchase"
      - name: oec
        description: "Original equipment cost or purchase price"
      - name: business_segment_id
        description: "Identifier for the business segment associated with the asset"
      - name: business_segment_name
        description: "Name of the business segment associated with the asset. E.g. Gen Rental, ITL, Advanced Solutions"
      - name: tracker_id
        description: "Tracker that is currently installed on the asset. This is a foreign key to the trackers table."
      - name: tracker_install_date
        description: "Date the current tracker was installed on the asset"
      - name: description
        description: >
          Description of the asset. This is a free text field that comes from the 'name' field on the assets table.
           It is used to define additional characteristics on attachments
      - name: payout_program_id
        description: "Unique identifier for the payout program"
      - name: payout_program_name
        description: "Name of the payout program"
      - name: payout_program_type_id
        description: "Identifier for the payout program type"
      - name: payout_program_type
        description: "Name of the payout program type"
      - name: asset_payout_percentage
        description: "Payout percentage for the asset"
      - name: is_payout_program_unpaid
        description: >
          Indicates if the payout program is unpaid. payout_program_id 104 indicates
          that the asset will be added to an active payout program soon, but it hasn't
          been paid for by the OWN participant yet.
        data_tests:
          - not_null
      - name: is_payout_program_enrolled
        description: "Indicates if the asset is enrolled (must have paid) in a payout program."
        data_tests:
          - not_null
      - name: is_own_program_asset
        description: "Indicates if asset is an own program asset."
      - name: asset_inventory_status
        description: >
          Inventory status of the asset. This is the inventory status of the asset as of the current date. 
          This can be null. Default to 'No Inventory Status' if null.
      - name: battery_voltage_type_id
        description: "Foreign key to the battery_voltage_types table"
      - name: battery_voltage_type
        description: "Battery voltage for the asset e.g. 12V"
      - name: url_admin
        description: "URL to the asset page in admin"
      - name: url_t3
        description: "URL to the asset page in t3"
      - name: is_deleted
        description: >
          Flag indicating if the asset is deleted. This appears to just be if the asset was put in jeff's junkyard. This
          is not very useful as company ownership is going to be used in any instance we look at asset data.
      - name: date_created
        description: "Date the asset record was created"
      - name: date_updated
        description: "Date the asset record was last updated"
      - name: date_deleted
        description: "Date the asset was deleted. See is_deleted."
