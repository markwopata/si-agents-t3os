                  22 (bulk below book) is passed through this rate achievement check"
        description: ""
      - name: grace_period_flag
        description: ""
      - name: deal_floor_flag
        description: ""
      - name: business_segment_id
        description: ""
      - name: deal_floor
        description: ""
      - name: floor_rate
        description: ""
      - name: benchmark_rate
        description: ""
      - name: book_rate
        description: ""
      - name: source_model
        description: ""
      - name: _es_update_timestamp
        description: "{{ doc('_es_update_timestamp') }}"
