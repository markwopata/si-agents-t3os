---
version: 2
models:
  - name: int_pre_acquisition_revenue
    description: "Intermediate model for pre-acquisition revenue calculations."
    data_tests:
        - dbt_expectations.expect_compound_columns_to_be_unique:
            column_list:
            - datetime_created
            - market_id
    columns:
      - name: bt_branch_id
        description: "{{ doc('bt_branch_id') }}"
      - name: market_id
        description: "Identifier for the market."
      - name: market_name
        description: "Name of the market."
      - name: description
        description: "Description of the revenue type. Always 'Pre-Acquisition Revenue'."
      - name: total_amount
        description: "Total revenue amount."
      - name: datetime_created
        description: "Date when the revenue was recorded."
      - name: line_type
        description: "Type of the line item. Always 'Manual' for pre-acquisition revenue."
