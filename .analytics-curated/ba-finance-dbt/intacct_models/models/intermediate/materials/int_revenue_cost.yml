---
version: 2
models:
  - name: int_revenue_cost
    description: "Intermediate model for revenue and cost calculations."
    data_tests:
        - dbt_expectations.expect_compound_columns_to_be_unique:
            column_list:
            - header_id
            - line_id
    columns:
      - name: bt_branch_id
        description: "{{ doc('bt_branch_id') }}"
      - name: bt_branch_code
        description: "Code representing the branch."
      - name: market_id
        description: "Identifier for the market."
      - name: market_name
        description: "Name of the market."
      - name: bt_start_date
        description: "Start date for the branch transaction."
      - name: line_id
        description: "Identifier for the line item."
        data_tests:
          - not_null
      - name: header_id
        description: "Identifier for the header."
      - name: header_number
        description: "Number representing the header."
      - name: description
        description: "Description of the line item."
      - name: unit_amount
        description: "Unit amount for the line item."
      - name: total_cost
        description: "Total cost for the line item."
      - name: total_amount
        description: "Total amount for the line item."
      - name: market_name
        description: "Name of the market."
