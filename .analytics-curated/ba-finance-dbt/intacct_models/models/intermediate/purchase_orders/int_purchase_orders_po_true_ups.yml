version: 2

models:
  - name: int_purchase_orders_po_true_ups
    description: |
      Initial query for list of purchase orders and related APA true-ups.

      Model Name: PO Lineage
      
      Model:  The purpose of this model is to combine the different converting documents to its
              original po. We do not have good visibility to all of the converting docs in sage or looker.
              This model joins the converting docs back to the parent po along with the true up journals posted
              for price variances. The model identifies po/po line status, unconverted qty/$. 

      Model Steps:
        - step 1: (int_purchase_orders_po_to_vi) combines converting doc to po
        - step 2: (int_purchase_orders_po_true_ups) pulls all apa true ups
        - step 3: (int_purchase_orders_po_union) union step 1 & 2
        - step 4: (int_purchase_orders_po_aggregate) calculate po/po line totals
        - step 5: (int_purchase_orders_po_lineage) joins step 3 & 4, adds unconverted row

      Grain:
        - One record per combination of:
          - fk_subledger_line_id (PO line)
          - fk_gl_entry_id (APA GL entry id)
          - converting_doc_fk_po_line_id (nullable)

      Notes:
        - relieved_by is always 'apa true up'
        - quantity, po_amount, cpo_amount, vi_amount, relieved_quantity are 0 in this model
        - unit_price is 0; extended_amount mirrors apa_trueup_amount
        

    meta:
      owner: "Zack Larimore <zack.larimore@equipmentshare.com>"
      domain: "finance"
      area: "PO/AP matching"

    tags: ["finance", "po", "ap", "intacct", "apa", "trueup", "reconciliation"]

    config:
      materialized: table

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - fk_subledger_line_id
            - fk_gl_entry_id
            - converting_doc_fk_po_line_id

    columns:
      - name: fk_subledger_line_id
        description: "Foreign key to the PO line (Intacct subledger line)."

      - name: gl_amount
        description: "GL amount on this row's join grain."

      - name: receipt_number
        description: "PO/receipt number."

      - name: document_name
        description: "PO document name (long)."

      - name: quantity
        description: "0 for APA true-up rows."

      - name: unit_price
        description: "0 for APA true-up rows."

      - name: extended_amount
        description: "APA posted amount (mirrors apa_trueup_amount)."

      - name: po_amount
        description: "0 for APA true-up rows."

      - name: cpo_amount
        description: "0 for APA true-up rows."

      - name: apa_trueup_amount
        description: "APA true-up amount posted."

      - name: vi_amount
        description: "0 for APA true-up rows."

      - name: expense_account_number
        description: "Expense account number impacted by the APA true-up."

      - name: relieved_by
        description: "Literal indicator for this model ('apa true up')."

      - name: relieved_by_entry_date
        description: "GL entry date of the true-up."

      - name: relieved_quantity
        description: "0 for APA true-up rows."

      - name: closed_receipts
        description: "Empty for APA true-up rows."

      - name: bill_numbers
        description: "Empty for APA true-up rows."

      - name: url_sage
        description: "Deep link to the Sage PO."

      - name: entry_date
        description: "APA true-up posted date (from atue.var_posted_date)."

      - name: url_journal
        description: "Deep link to the Sage journal entry for the true-up."

      - name: t3_cost_capture_url
        description: "Deep link to T3 cost capture for the PO line."

      - name: journal_number
        description: "APA true-up journal transaction number."

      - name: vendor_id
        description: "Vendor id from the PO context."

      - name: vendor_name
        description: "Vendor name from the PO."

      - name: line_description
        description: "PO line description."

      - name: mkt_id
        description: "Market/branch/department id from GL (department_id)."

      - name: converting_doc_fk_po_line_id
        description: "fk_po_line_id from the converting/relieving document (nullable)."

      - name: converting_doc
        description: "Constructed converting document label (e.g., 'APA TRUE UP-<fk_po_line_id>')."

      - name: recordno
        description: "Parsed from GL entry_description (split before ' - '); used to match source PO line id text."

      - name: fk_gl_entry_id
        description: "Foreign key to the APA GL entry from atue.fk_gl_entry_id."