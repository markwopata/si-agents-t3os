version: 2

models:
  - name: int_monday_unpivoted_values
    description: >
      Combine monday.com tables into a single table with one row per column value.
      Exclude fivetran deleted rows. I assume this has multiple common uses for debugging
      while not having to build up the query every time. This will result in unpivoted column values.
      Next step is to pivot to specific columns for a specific board into a specific mart.
    data_tests:
      - dbt_expectations.expect_compound_columns_to_be_unique:
          arguments:
            column_list:
              - board_id
              - item_id
              - column_id
