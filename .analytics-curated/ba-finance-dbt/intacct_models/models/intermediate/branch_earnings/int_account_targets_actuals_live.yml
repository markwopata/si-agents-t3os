version: 2

models:
  - name: int_account_targets_actuals_live
    description: >
      Produces live MTD current-month amounts by account for unpublished BE periods.
    columns:
      - name: market_id
        description: Market identifier (parent market id).
        tests:
          - not_null

      - name: gl_month
        description: Month (date_trunc month) corresponding to the actuals/projection period.
        tests:
          - not_null

      - name: account_no
        description: Source GL account number.
        tests:
          - not_null

      - name: account_name
        description: Source GL account name.
        tests:
          - not_null

      - name: rev_exp
        description: Revenue/Expense category (REV/EXP), derived from plexi bucket mapping or source.
        tests:
          - not_null

      - name: account_category
        description: Display bucket/type (from plexi bucket mapping display_name when available, otherwise source account_category).
        tests:
          - not_null

      - name: cost_type
        description: Cost type classification, either controllable or fixed

      - name: actual_amount
        description: >
          Current month-to-date actual amount for the account. Expense amounts are multiplied by -1
          so expenses are stored as positive values.
        tests:
          - not_null

      - name: mtd_amount
        description: >
          MTD amount for the account, as compared to current month. This MTD amount is used in the month-end projections.
        tests:
          - not_null

      - name: comp_metric
        description: Metric flag determining which denominator is used for comp_metric_amount.

      - name: comp_metric_amount
        description: Denominator amount (OEC or revenue metric) for the same market_id and gl_month.

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - market_id
            - gl_month
            - account_no
            - account_name