---
version: 2

models:
  - name: int_vsg_reservations_snapshot_enriched
    description: >
      Enriched SCD2 snapshot of VSG reservations. Adds region metadata,
      localized pickup timestamps, and derived date fields to support
      daily operational reporting and rental analysis.

    columns:
      - name: dbt_scd_id
        description: Unique surrogate key for the SCD2 snapshot record.
        data_tests:
          - unique
          - not_null

      - name: id
        description: Primary key of the reservation in the source system.

      - name: reservation_id
        description: Numeric reservation identifier extracted from the prefixed ID.

      - name: confirm_insurance
        description: Indicates whether insurance confirmation was completed.

      - name: confirm_license
        description: Indicates whether driver license confirmation was completed.

      - name: phone
        description: Customer phone number associated with the reservation.

      - name: vehicle_vin
        description: Vehicle VIN associated with the reservation.

      - name: vehicle_status
        description: Status of the vehicle.

      - name: vehicle_notes
        description: Notes associated with the vehicle.

      - name: email
        description: Customer email address.

      - name: customer_first_name
        description: Customer first name.

      - name: return_at
        description: Scheduled return timestamp (UTC).

      - name: pickup_at
        description: Scheduled pickup timestamp (UTC).

      - name: pickup_location
        description: Pickup location name.

      - name: return_location
        description: Return location name.

      - name: pickup_timezone
        description: Timezone of the pickup location (IANA format).

      - name: return_timezone
        description: Timezone of the return location (IANA format).

      - name: status
        description: Current reservation status (e.g., Pending, Started, On Rent, Returned, Canceled).

      - name: vehicle_model
        description: Vehicle model associated with the reservation.

      - name: customer_last_name
        description: Customer last name.

      - name: prefixed_id
        description: Reservation identifier including prefix from the source system.

      - name: pickup_location_id
        description: Identifier of the pickup location.

      - name: return_location_id
        description: Identifier of the return location.

      - name: vehicle_class
        description: Vehicle class/category.

      - name: payment_balance
        description: Outstanding payment balance for the reservation.

      - name: security_balance
        description: Outstanding security balance for the reservation.

      - name: platform
        description: Booking platform (e.g., Turo, HQ Rental, internal platform).

      - name: platform_id
        description: Platform-specific reservation identifier.

      - name: notes
        description: Internal notes associated with the reservation.

      - name: region_id
        description: Region identifier from the source system.

      - name: region_name
        description: Human-readable region name.

      - name: created_at
        description: Timestamp when the reservation was created.

      - name: billing_complete
        description: Indicates whether billing has been completed.

      - name: pickup_photos
        description: Indicator or reference to pickup photos.

      - name: return_photos
        description: Indicator or reference to return photos.

      - name: return_user_id
        description: User who processed the return.

      - name: pickup_user_id
        description: User who processed the pickup.

      - name: upload_return_photos
        description: Indicates whether return photos were uploaded.

      - name: upload_pickup_photos
        description: Indicates whether pickup photos were uploaded.

      - name: damage_waiver
        description: Indicates whether a damage waiver was applied.

      - name: charging_balance
        description: Outstanding charging balance.

      - name: charging_method
        description: Charging method used for the reservation.

      - name: late
        description: Indicates whether the reservation return was late.

      - name: extended
        description: Indicates whether the reservation was extended.

      - name: returned_at
        description: Timestamp when the vehicle was returned.

      - name: picked_up_at
        description: Timestamp when the vehicle was picked up.

      - name: updated_at
        description: Timestamp when the reservation was last updated in the source system.

      - name: return_schedule_priority
        description: Return scheduling priority value.

      - name: pickup_schedule_priority
        description: Pickup scheduling priority value.

      - name: collections_status
        description: Collections status of the reservation.

      - name: gclid
        description: Google Click ID associated with the reservation.

      - name: tesla_rents_id
        description: Tesla Rents identifier, if applicable.

      - name: is_expired
        description: Indicates whether the reservation has expired.

      - name: _fivetran_deleted
        description: Fivetran soft-delete indicator.

      - name: _fivetran_synced
        description: Timestamp of the last sync from Fivetran.

      - name: created_by_service
        description: Service that created the reservation record.

      - name: dbt_updated_at
        description: Timestamp used by dbt snapshot to detect changes.

      - name: dbt_snapshot_date
        description: Date (day-truncated) of the snapshot run.

      - name: dbt_valid_from
        description: Timestamp when this snapshot version became valid.

      - name: dbt_valid_to
        description: Timestamp when this snapshot version was invalidated (null if current).

      - name: pickup_at_local_tz
        description: Pickup timestamp converted to the pickup location’s local timezone.

      - name: pick_up_date
        description: Day-truncated local pickup date.

      - name: is_rented
        description: Indicates whether the reservation has been picked up (picked_up_at is not null).