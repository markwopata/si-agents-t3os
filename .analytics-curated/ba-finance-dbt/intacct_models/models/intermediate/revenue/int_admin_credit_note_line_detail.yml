---
version: 2
models:
  - name: int_admin_credit_note_line_detail
    description: >
      Line level pre-aggregated view of admin credit notes. Pulls in commonly used tables and
      fields like customer name, line type account, asset, rental, and invoice linkage for financial
      and operational reporting.
    columns:
      - name: credit_note_id
        description: "Unique identifier for the credit note."
      - name: credit_note_number
        description: "Credit note number as recorded in the system."
      - name: gl_date
        description: "This is the date the credit note hits the GL. As soon as the credit note is created, it will hit the GL. Same as date_created"
      - name: market_id
        description: "Market this credit note was issued from. Foreign key to markets table."
      - name: market_name
        description: "Market name where the credit note was issued."
      - name: company_id
        description: "ID for the customer credited on this note."
      - name: customer_name
        description: "Name of the customer. Synonym for company_name."
      - name: credit_note_memo
        description: "Memo or notes associated with the credit note. Can be blank or null."
      - name: credit_note_reference
        description: "PO/Reference field on the front end. When the credit note originates from an invoice, this is the invoice number 99% of the time. Otherwise, this is pretty much free-text."
      - name: credit_note_line_item_id
        description: "Unique identifier for the credit note line item."
        data_tests:
          - not_null
          - unique
      - name: line_item_id
        description: "Unique identifier for the related invoice line item."
      - name: line_item_type_id
        description: "Foreign key to the line_item_types table."
      - name: line_item_type_name
        description: "Line item type name - also known as admin charge type."
      - name: avalara_transaction_id
        description: "Avalara transaction ID associated with the credit note."
      - name: account_number
        description: "GL account number associated with the line item."
      - name: account_name
        description: "GL account name."
      - name: credit_amount
        description: "Credit amount for the line item. This is the amount before tax."
      - name: credit_tax_amount
        description: "Credit tax amount for the line item."
      - name: original_line_amount
        description: "Original amount for the line item before credit."
      - name: original_line_tax_amount
        description: "Original tax amount for the line item before credit."
      - name: is_taxable
        description: "Indicates if the line item is taxable."
      - name: line_item_description
        description: "Description on the credit note line item."
      - name: credit_note_date_created
        description: "Datetime the credit note was created."
      - name: credit_note_date_updated
        description: "Datetime the credit note was last updated."
      - name: credit_note_line_item_date_created
        description: "Datetime the credit note line item was created."
      - name: credit_note_line_item_date_updated
        description: "Datetime the credit note line item was last updated."
      - name: originating_invoice_id
        description: "ID of the originating invoice, if applicable. Foreign key to invoices table."
      - name: is_generated_from_invoice
        description: "Indicates if the credit note was generated from an invoice."
      - name: invoice_number
        description: "Invoice number associated with the credit note. Invoice the credit note was generated from. Pulled from the invoice."
      - name: invoice_billing_approved_date
        description: "Date when the associated invoice was billing approved. Pulled from the invoice."
      - name: invoice_date
        description: "The invoice date for the associated invoice. Pulled from the invoice."
      - name: invoice_memo
        description: "Memo or notes for the associated invoice. Can be blank or null. Pulled from the invoice."
      - name: asset_id
        description: "Indicates what asset the line item is for. Foreign key to assets table. Pulled from the invoice."
      - name: rental_id
        description: "Indicates what rental the line item is for. Foreign key to rentals table. Pulled from the invoice."
      - name: invoice_cycle_start_date
        description: "For rentals, this date marks the start of the rental. This is the start_date on the invoice. Pulled from the invoice."
      - name: invoice_cycle_end_date
        description: "For rentals, this date marks the end of the rental. This is the end_date on the invoice. Pulled from the invoice."
      - name: rental_bill_type
        description: >
          For rentals, this indicates the type of billing. Billing types include final, cycle,
          partial-return. If billing is final, it's the last invoice for the rental. If it's a cycle invoice,
          it's a bill for an ongoing rental. Pulled from the invoice."
      - name: rental_cheapest_period_hour_count
        description: "Number of hours credited for rental, based on the cheapest total combination of periods at the time of billing. Pulled from the invoice."
      - name: rental_cheapest_period_day_count
        description: "Number of days credited for rental, based on the cheapest total combination of periods at the time of billing. Pulled from the invoice."
      - name: rental_cheapest_period_week_count
        description: "Number of weeks credited for rental, based on the cheapest total combination of periods at the time of billing. Pulled from the invoice."
      - name: rental_cheapest_period_four_week_count
        description: "Number of four-week periods credited for rental, based on the cheapest total combination of periods at the time of billing. Pulled from the invoice."
      - name: rental_cheapest_period_month_count
        description: "Number of months credited for rental, based on the cheapest total combination of periods at the time of billing. Pulled from the invoice."
      - name: rental_price_per_hour
        description: "Price applied per hour for the rental, used when hours are part of the cheapest total combination of periods credited. Pulled from the invoice."
      - name: rental_price_per_day
        description: "Price applied per day for the rental, used when days are part of the cheapest total combination of periods credited. Pulled from the invoice."
      - name: rental_price_per_week
        description: "Price applied per week for the rental, used when weeks are part of the cheapest total combination of periods credited. Pulled from the invoice."
      - name: rental_price_per_four_weeks
        description: "Price applied per four weeks for the rental, used when four-week periods are part of the cheapest total combination of periods credited. Pulled from the invoice."
      - name: rental_price_per_month
        description: "Price applied per month for the rental, used when months are part of the cheapest total combination of periods credited. Pulled from the invoice."
      - name: is_intercompany
        description: "Indicates if the transaction is intercompany (or credited to EquipmentShare or one of its subs.)."
      - name: line_item_market_id
        description: "Market ID for the line item, if available."
      - name: primary_salesperson_id
        description: "Primary salesperson ID for the invoice. Pulled from the invoice."
      - name: secondary_salesperson_ids
        description: "Secondary salesperson IDs for the invoice as an array. Pulled from the invoice."
      - name: order_id
        description: >
          Every credit note is generated from an order, typically via the originating invoice. Foreign key to orders table. The flow is typically order -> rental -> invoice -> credit note, but it can also go order -> invoice -> credit note. Pulled from the invoice."
      - name: url_credit_note_admin
        description: "URL to the credit note in admin."
      - name: url_invoice_admin
        description: "URL to the invoice in admin. Pulled from the invoice."
      - name: ship_to_branch_id
        description: "Branch ID for the asset ship to location from the credit note."
      - name: ship_to_location_id
        description: "Location ID for the asset ship to location from the credit note."
      - name: ship_to_nickname
        description: "Nickname for the asset ship to location from the credit note."
      - name: ship_to_country
        description: "Country for the asset ship to location from the credit note."
      - name: ship_to_state
        description: "State for the asset ship to location from the credit note."
      - name: ship_to_city
        description: "City for the asset ship to location from the credit note."
      - name: ship_to_street
        description: "Street for the asset ship to location from the credit note."
      - name: ship_to_zip_code
        description: "Zip code for the asset ship to location from the credit note."
      - name: ship_to_longitude
        description: "Longitude for the asset ship to location from the credit note."
      - name: ship_to_latitude
        description: "Latitude for the asset ship to location from the credit note."
      - name: ship_from_branch_id
        description: "Branch ID for the asset ship from location from the credit note."
      - name: ship_from_location_id
        description: "Location ID for the asset ship from location from the credit note."
      - name: ship_from_nickname
        description: "Nickname for the asset ship from location from the credit note."
      - name: ship_from_country
        description: "Country for the asset ship from location from the credit note."
      - name: ship_from_state
        description: "State for the asset ship from location from the credit note."
      - name: ship_from_city
        description: "City for the asset ship from location from the credit note."
      - name: ship_from_street
        description: "Street for the asset ship from location from the credit note."
      - name: ship_from_zip_code
        description: "Zip code for the asset ship from location from the credit note."
      - name: ship_from_longitude
        description: "Longitude for the asset ship from location from the credit note."
      - name: ship_from_latitude
        description: "Latitude for the asset ship from location from the credit note."