version: 2

unit_tests:
  - name: test_bad_asset_transfers_single_transfer_rental_first_then_sale
    model: int_asset_bad_transfers
    given:
      - input: ref('stg_es_warehouse_scd__scd_asset_rsp')
        rows:
          - asset_id: '1'
            rental_branch_id: '101'
            date_start: '2022-01-01'
            date_end: '2023-12-31'
            _es_update_timestamp: null
          - asset_id: '1'
            rental_branch_id: '102'
            date_start: '2024-01-01'
            date_end: '2024-06-30'
      - input: ref('market')
        rows:
          - child_market_id: '101'
            child_market_name: 'Market A'
            market_id: '501'
            market_name: 'Parent Market A'
            branch_earnings_start_month: '2022-01-01'
          - child_market_id: '102'
            child_market_name: 'Market B'
            market_id: '502'
            market_name: 'Parent Market B'
            branch_earnings_start_month: '2024-01-01'
      - input: ref('stg_es_warehouse_public__markets')
        rows: []
      - input: ref('stg_es_warehouse_public__assets_aggregate')
        rows:
          - asset_id: '1'
            oec: try_cast('10000.000000000000' as decimal(38,12))
      - input: ref('stg_es_warehouse_public__orders')
        rows:
          - order_id: '9876'
            user_id: '5432'
      - input: ref('stg_es_warehouse_public__users')
        rows:
          - user_id: '5432'
            company_id: '1854'
      - input: ref('stg_analytics_public__es_companies')
        rows: []
      - input: ref('stg_es_warehouse_public__rentals')
        rows:
          - rental_id: '2001'
            order_id: '9876'
            rental_status_id: '7'
      - input: ref('stg_es_warehouse_public__equipment_assignments')
        rows:
          - rental_id: '2001'
            asset_id: '1'
            date_start: '2024-01-15'
            date_end: '2024-03-15'
      - input: ref('stg_es_warehouse_public__invoices')
        rows:
          - invoice_id: '3001'
            billing_approved: true
            billing_approved_date: '2024-01-20'
      - input: ref('stg_es_warehouse_public__line_items')
        rows:
          - invoice_id: '3001'
            asset_id: '1'
            line_item_type_id: '24'
    expect:
      rows:
        - asset_id: '1'
          oec: try_cast('10000.000000000000' as decimal(38,12))
          from_market_id: '501'
          from_market_name: 'Parent Market A'
          from_date_end: '2023-12-31'
          from_age_at_transfer: '24'
          to_market_id: '502'
          to_market_name: 'Parent Market B'
          to_age_at_transfer: '1'
          when_market_is_12_months: '2025-01-01'
          end_cost_date: '2024-01-15'
          equipment_charge_date: '2024-01-01'
          is_first_dump_charge: true

