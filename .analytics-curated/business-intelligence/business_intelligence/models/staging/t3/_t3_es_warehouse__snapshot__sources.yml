version: 2

sources:
  - name: es_warehouse__snapshot
    config:
      freshness: # default freshness
        warn_after: {count: 12, period: hour}
        error_after: {count: 24, period: hour}
      loaded_at_field: _es_update_timestamp
    database: es_warehouse
    schema: snapshot
    tables:
      - name: asset_last_location
        columns:
          - name: asset_last_location_id
            data_type: number
          - name: address
            data_type: varchar
          - name: asset_id
            data_type: number
          - name: start_date
            data_type: timestamp_tz
          - name: end_date
            data_type: timestamp_tz
          - name: geofences
            data_type: varchar
          - name: last_checkin_timestamp
            data_type: timestamp_tz
          - name: last_location_timestamp
            data_type: timestamp_tz
          - name: location
            data_type: varchar
          - name: rental_id
            data_type: number
          - name: _es_update_timestamp
            data_type: timestamp_tz
