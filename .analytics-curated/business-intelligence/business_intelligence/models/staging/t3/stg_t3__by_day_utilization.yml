version: 2

models:
  - name: stg_t3__by_day_utilization
    description: "
        Note: For Fleet Utilization dashboard.
        This table contains a rollup of every asset by day for the past 2 years that has reported utilization at any point during that timeframe. 
        Every asset should have one day value, unless rental_company_id, owner_company_id, job_id, phase_job_id has differnt values.
        There is a primary key by concating - date, asset_id, rental_company_id, owner_company_id, job_id, phase_job_id
      "
    columns:
      - name: primary_key
        data_type: string
        description: "Primary Key"
      
      - name: date
        data_type: timestamp
        description: "Date"

      - name: asset_id
        data_type: number
        description: "Asset ID"
      
      - name: rental_company_id
        data_type: varchar
        description: "Owner Company ID"

      - name: owner_company_id
        data_type: varchar
        description: "Owner Company ID"
      
      - name: start_date
        data_type: varchar
        description: "Start Date"

      - name: end_date
        data_type: varchar
        description: "End Date"

      - name: job_id
        data_type: number
        description: "Job ID"

      - name: job_name
        data_type: varchar
        description: "Job Name"

      - name: phase_job_id
        data_type: number
        description: "Phase Job ID"

      - name: phase_job_name
        data_type: varchar
        description: "Phase Job Name"

      - name: phase_job_id
        data_type: number
        description: "Phase Job ID"

      - name: phase_job_name
