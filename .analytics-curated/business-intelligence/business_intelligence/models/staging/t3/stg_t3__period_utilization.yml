version: 2

models:
  - name: stg_t3__period_utilization
    description: |
      Period Utilization Report - Calculates utilization for different time periods based on run_time_cst.
      Returns a single row per rental_id and asset_id combination with columns for each period type.
      Utilization is calculated based on shift_type_id: 3 = 24 hours/day, 2 = 16 hours/day, else 8 hours/day.
      Each period includes utilization, run_time_hours, possible_hours, and possible_days metrics.
    columns:
      - name: rental_id
        data_type: number
        description: "Rental ID"

      - name: asset_id
        data_type: number
        description: "Asset ID"

      - name: shift_type_id
        data_type: number
        description: "Shift Type ID - determines hours per day (3=24hrs, 2=16hrs, else=8hrs)"

      - name: past_7_days_utilization
        data_type: float
        description: "Utilization percentage for past 7 days"

      - name: past_7_days_run_time_hours
        data_type: float
        description: "Total run time in hours for past 7 days"

      - name: past_7_days_possible_hours
        data_type: float
        description: "Total possible hours for past 7 days based on shift type"

      - name: past_7_days_possible_days
        data_type: number
        description: "Total possible days for past 7 days"

      - name: past_28_days_utilization
        data_type: float
        description: "Utilization percentage for past 28 days"

      - name: past_28_days_run_time_hours
        data_type: float
        description: "Total run time in hours for past 28 days"

      - name: past_28_days_possible_hours
        data_type: float
        description: "Total possible hours for past 28 days based on shift type"

      - name: past_28_days_possible_days
        data_type: number
        description: "Total possible days for past 28 days"

      - name: this_week_utilization
        data_type: float
        description: "Utilization percentage for current week (Monday to Sunday)"

      - name: this_week_run_time_hours
        data_type: float
        description: "Total run time in hours for current week"

      - name: this_week_possible_hours
        data_type: float
        description: "Total possible hours for current week based on shift type"

      - name: this_week_possible_days
        data_type: number
        description: "Total possible days for current week"

      - name: last_week_utilization
        data_type: float
        description: "Utilization percentage for last week (Monday to Sunday)"

      - name: last_week_run_time_hours
        data_type: float
        description: "Total run time in hours for last week"

      - name: last_week_possible_hours
        data_type: float
        description: "Total possible hours for last week based on shift type"

      - name: last_week_possible_days
        data_type: number
        description: "Total possible days for last week"

      - name: this_week_to_date_utilization
        data_type: float
        description: "Utilization percentage for current week to date"

      - name: this_week_to_date_run_time_hours
        data_type: float
