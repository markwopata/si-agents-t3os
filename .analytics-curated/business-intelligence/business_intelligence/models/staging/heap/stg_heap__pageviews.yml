version: 2

models:
  - name: stg_heap__pageviews
    description: "{{ doc('heap__pageviews') }}"
    tests:
      - dbt_expectations.expect_table_row_count_to_equal_other_table:
          arguments:
            compare_model: source('heap', 'pageviews')
          config:
            severity: error
            error_if: ">100"
            warn_if: ">0"
