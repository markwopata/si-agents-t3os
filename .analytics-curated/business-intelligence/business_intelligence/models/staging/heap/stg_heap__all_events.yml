version: 2

models:
  - name: stg_heap__all_events
    description: "{{ doc('heap__all_events') }}"
    columns:
      - name: event_id
        data_type: number
        description: "{{ doc('heap__event_id') }}"

      - name: event_time
        data_type: timestamp_ltz
        description: "{{ doc('heap__event_id') }}"

      - name: heap_user_id
        data_type: number
        description: "{{ doc('heap__user_id') }}"
        data_tests:
          - not_null

      - name: session_id
        data_type: number
        description: "{{ doc('heap__session_id') }}"

      - name: event_table_name
        data_type: varchar
        description: "{{ doc('heap__event_table_name') }}"

      - name: _dbt_updated_timestamp
        data_type: timestamp_ntz
        description: "{{ doc('_dbt_updated_timestamp') }}"
