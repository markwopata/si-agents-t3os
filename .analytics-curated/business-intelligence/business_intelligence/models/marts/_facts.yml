  - name: fact_onrent_metrics
    description: "Denormalized on-rent rental metrics fact table for Looker V3 flat reporting."
    columns:
      - name: rental_key
        data_type: varchar
        description: "Foreign key to platform.dim_rentals."

      - name: rental_id
        data_type: number
        description: "Source rental identifier from ESDB."

      - name: asset_id
        data_type: number
        description: "Asset assigned to the rental. Null for bulk orders."

      - name: company_id
        data_type: number
        description: "Customer company identifier."

      - name: order_id
        data_type: number
        description: "Source order identifier tied to the rental."

      - name: total_invoiced_amount
        data_type: number(18,2)
        description: "Total invoiced spend for the rental."

      - name: total_days_on_rent
        data_type: number(10,0)
        description: "Number of days the current equipment has been on rent."

      - name: rental_start_date
        data_type: date
        description: "Start date of the current equipment assignment on rent."

      - name: previous_day_utilization_utc
        data_type: float
        description: "Utilization hours recorded yesterday (UTC)."

      - name: sub_renting_company
        data_type: varchar
        description: "Name of the sub-renter company receiving re-rented equipment."

      - name: sub_renting_contact
        data_type: varchar
        description: "Contact name associated with the sub-renter."

