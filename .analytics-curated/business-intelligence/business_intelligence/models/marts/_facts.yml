      - name: original_purchase_price
        data_type: number(14,4)
        description: "{{ doc('asset_purchase_original_purchase_price') }}"

      - name: latest_purchase_price
        data_type: number(14,4)
        description: "{{ doc('asset_purchase_latest_purchase_price') }}"

