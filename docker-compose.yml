services:
  postgres:
    image: postgres:16-alpine
    container_name: si_management_postgres
    environment:
      POSTGRES_DB: si_management
      POSTGRES_USER: si_management
      POSTGRES_PASSWORD: si_management
    ports:
      - "54329:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U si_management -d si_management"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:

